TYPOGRAPHY:
- What Google Fonts did you choose and why? Pirata One and UnifrakturMaguntia because I thought both of them looked good.
- How do they complement each other (font pairing)? They're both easy to read and kinda of look similar.
- What font weights did you use? 400
- How did you make your typography responsive? Adding a @media in the style.css
 
IMAGES:
- How did you optimize your images? Changing the sizes.
- What file types did you use and why? Jpegs, pngs, multiple of them.
- How did you ensure your images are responsive? By making the size of the page thinner, so it is like I was on a phone.
 
RESPONSIVE DESIGN:
- What specific techniques did you use? Hamburger navbars.
- Where can these changes be seen on your site? On the very top with the navbar.
-->

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: Black;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 10px 20px;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            height: 3px;
            width: 25px;
            background: white;
            margin: 4px 0;
            transition: 0.3s;
        }

        /* Nav links */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .nav-links li a:hover {
            text-decoration: underline;
        }

        h2 {
            color: White;
        }

        h3 {
            color: White;
        }

        h1 {
            color: White;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background: #333;
                flex-direction: column;
                align-items: center;
                display: none;
            }

            .nav-links.active {
                display: flex;
            }
        }
    </style>
</head>
