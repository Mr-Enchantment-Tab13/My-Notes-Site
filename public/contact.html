<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: Black;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 10px 20px;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            height: 3px;
            width: 25px;
            background: white;
            margin: 4px 0;
            transition: 0.3s;
        }

        /* Nav links */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .nav-links li a:hover {
            text-decoration: underline;
        }

        h2 {
            color: White;
        }

        h1 {
            color: White;
        }
        h3 {
            color:White;
        }
        p {
            color: White;
        }

        div {
            color: White;
        }

        legend {
            color: White;
        }

        button {
            color: White
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background: #333;
                flex-direction: column;
                align-items: center;
                display: none;
            }

            .nav-links.active {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/artists">About</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <hr>


    <script>
        function toggleMenu() {
            document.querySelector('.nav-links').classList.toggle('active');
        }
    </script>
    <main class="form-page">

        <h1>Contact Us</h1>

        <p>Fill out the form below and we will get back to you within 24 hours.</p>


        <div class="form-group">

            <label for="fullName">Full Name <span class="required">*</span></label>

            <input type="text" id="fullName" name="fullName" placeholder="Jane Smith" autocomplete="name" required>

            <span class="error-msg" id="fullNameError"></span>
        </div>
        <div class="form-group">

            <label for="email">Email Address <span class="required">*</span></label>

            <input type="email" id="email" name="email" placeholder="jane@example.com" autocomplete="email" required>

            <span class="error-msg" id="emailError"></span>

        </div>
        <div class="form-group">

            <label for="phone">Phone Number</label>

            <input type="tel" id="phone" name="phone" placeholder="(208) 555-0100" autocomplete="tel">

            <span class="error-msg" id="phoneError"></span>

        </div>
        <div class="form-group">

            <label for="reason">Reason for Contact <span class="required">*</span></label>

            <select id="reason" name="reason" required>

                <option value="">-- Please select --</option>

                <option value="general">General Inquiry</option>

                <option value="support">Customer Support</option>

                <option value="sales">Sales Question</option>

                <option value="feedback">Feedback</option>

                <option value="other">Other</option>

            </select>

            <span class="error-msg" id="reasonError"></span>

        </div>
        <fieldset class="form-group">

            <legend>Preferred Contact Method <span class="required">*</span></legend>

            <div class="radio-group">

                <input type="radio" id="contactEmail" name="contactMethod" value="email" required>

                <label for="contactEmail">Email</label>

            </div>

            <div class="radio-group">

                <input type="radio" id="contactPhone" name="contactMethod" value="phone">

                <label for="contactPhone">Phone</label>

            </div>

            <div class="radio-group">

                <input type="radio" id="contactEither" name="contactMethod" value="either">

                <label for="contactEither">Either is fine</label>

            </div>

            <span class="error-msg" id="contactMethodError"></span>

        </fieldset>


        <fieldset class="form-group">

            <legend>I am interested in (select all that apply)</legend>

            <div class="checkbox-group">

                <input type="checkbox" id="svcConsulting" name="services" value="consulting">

                <label for="svcConsulting">Consulting</label>

            </div>

            <div class="checkbox-group">

                <input type="checkbox" id="svcDesign" name="services" value="design">

                <label for="svcDesign">Design Services</label>

            </div>

            <div class="checkbox-group">

                <input type="checkbox" id="svcTraining" name="services" value="training">

                <label for="svcTraining">Training</label>

            </div>

            <div class="checkbox-group">

                <input type="checkbox" id="svcSupport" name="services" value="support">

                <label for="svcSupport">Ongoing Support</label>

            </div>

        </fieldset>


        <div class="form-group">

            <label for="callbackDate">Preferred Callback Date</label>

            <input type="date" id="callbackDate" name="callbackDate" min="2024-01-01">

        </div>

        <div class="form-group">

            <label for="employees">Number of Employees</label>

            <input type="number" id="employees" name="employees" min="1" max="10000" placeholder="e.g. 25">

        </div>

        <div class="form-group">

            <label for="message">Message <span class="required">*</span></label>

            <textarea id="message" name="message" rows="5" placeholder="Tell us how we can help you..." maxlength="1000"
                required></textarea>

            <small class="hint">Maximum 1000 characters</small>

            <span class="error-msg" id="messageError"></span>

        </div>

        <div class="form-buttons">

            <button type="submit">Send Message</button>

            <button type="reset">Clear Form</button>

        </div>
    </main>



    <script src="js/formValidation.js"></script>
    </nav>

    <hr>



</body>

</html>
